<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="git push publishing workflow">
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e7e5e4" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#78716c"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#fafaf9"/>
  <rect width="800" height="500" fill="url(#grid2)"/>
  <rect x="60" y="190" width="180" height="120" rx="12" fill="#f5f5f4" stroke="#e7e5e4"/>
  <text x="150" y="240" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#1c1917">post.mdx</text>
  <text x="150" y="275" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#78716c">markdown</text>
  <line x1="250" y1="250" x2="330" y2="250" stroke="#78716c" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6 5"/>
  <rect x="340" y="190" width="180" height="120" rx="12" fill="#f5f5f4" stroke="#e7e5e4"/>
  <text x="430" y="240" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#1c1917">git push</text>
  <text x="430" y="275" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#78716c">github</text>
  <line x1="530" y1="250" x2="610" y2="250" stroke="#78716c" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6 5"/>
  <rect x="620" y="190" width="120" height="120" rx="12" fill="#1c1917"/>
  <text x="680" y="240" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#fafaf9">live</text>
  <text x="680" y="275" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#a8a29e">vercel</text>
</svg>
